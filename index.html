<style>
  :root {
    --ink: #1a1a2e;
    --red: #c0392b; --red-light: #fadbd8;
    --gold: #d4a017; --gold-light: #fef9e7;
    --green: #1e8449; --green-light: #d5f5e3;
    --bg: #faf8f5; --surface: #ffffff;
    --border: #e8e0d5; --muted: #7f8c8d;
    --blue: #2980b9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; padding: 16px;
    max-width: 680px; margin: 0 auto;
  }
  header {
    text-align: center; padding: 20px 0 16px;
    border-bottom: 2px solid var(--gold); margin-bottom: 20px;
  }
  header h1 { font-size: 1.4rem; letter-spacing: 0.04em; }
  header p { font-size: 0.76rem; color: var(--muted); margin-top: 4px; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* 入力画面 */
  .card {
    background: var(--surface); border-radius: 14px;
    padding: 18px; border: 1px solid var(--border);
    margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .card h2 {
    font-size: 0.88rem; font-weight: 700;
    margin-bottom: 10px; display: flex; align-items: center; gap: 7px;
  }
  .badge {
    background: var(--ink); color: white; border-radius: 50%;
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
  }
  .format-hint {
    background: var(--gold-light); border-left: 3px solid var(--gold);
    padding: 10px 14px; border-radius: 0 8px 8px 0;
    font-size: 0.78rem; line-height: 1.9; margin-bottom: 12px; color: #5a4a00;
  }
  .format-hint code {
    background: rgba(0,0,0,0.08); padding: 1px 5px;
    border-radius: 4px; font-family: monospace;
  }
  .title-inp {
    width: 100%; padding: 10px 14px; font-size: 0.95rem;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--bg); outline: none; font-family: inherit;
  }
  .title-inp:focus { border-color: var(--blue); }
  textarea {
    width: 100%; min-height: 220px; padding: 12px;
    font-family: monospace; font-size: 0.88rem;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--ink);
    outline: none; resize: vertical; line-height: 1.9;
  }
  textarea:focus { border-color: var(--blue); }
  .msg {
    padding: 10px 14px; border-radius: 8px; font-size: 0.82rem;
    margin-top: 10px; display: none; line-height: 1.6; white-space: pre-wrap;
  }
  .msg.error { background: var(--red-light); color: var(--red); display: block; }
  .msg.success { background: var(--green-light); color: var(--green); display: block; }

  /* ボタン共通 */
  .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn {
    padding: 10px 16px; border-radius: 9px; border: none;
    font-size: 0.83rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-ink { background: var(--ink); color: white; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-muted { background: var(--border); color: var(--muted); }

  /* 練習画面 */
  .top-bar {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 14px;
  }
  .btn-back {
    background: none; border: 1.5px solid var(--border);
    border-radius: 8px; padding: 6px 12px;
    font-size: 0.76rem; color: var(--muted);
    cursor: pointer; font-family: inherit;
  }
  .mode-tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    background: var(--surface); border-radius: 12px;
    padding: 5px; border: 1px solid var(--border);
  }
  .mode-tab {
    flex: 1; padding: 9px 4px; border: none; border-radius: 8px;
    font-size: 0.7rem; font-weight: 500; cursor: pointer;
    background: transparent; color: var(--muted);
    transition: all 0.2s; line-height: 1.4; font-family: inherit;
  }
  .mode-tab.active { background: var(--ink); color: white; }
  .mode-tab .num { display: block; font-size: 1rem; margin-bottom: 2px; }

  .prog-bg { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; }
  .prog-bar {
    height: 100%; background: linear-gradient(90deg, var(--gold), var(--red));
    border-radius: 4px; transition: width 0.4s;
  }
  .prog-text { font-size: 0.7rem; color: var(--muted); text-align: right; margin: 3px 0 12px; }

  .pcard {
    background: var(--surface); border-radius: 16px;
    padding: 20px; border: 1px solid var(--border);
    margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .card-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; }
  .ja-text { font-size: 0.95rem; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
  .cn-big { font-size: 1.35rem; font-weight: 500; letter-spacing: 0.05em; margin-bottom: 6px; line-height: 1.8; }
  .py-text { font-size: 0.85rem; color: var(--blue); margin-bottom: 14px; }

  .blank-line { font-size: 1.1rem; line-height: 2.2; margin-bottom: 12px; }
  .blank-slot {
    display: inline-block; min-width: 70px;
    border-bottom: 2.5px solid var(--gold);
    color: var(--gold); font-weight: 700;
    text-align: center; padding: 0 4px;
  }
  .ans-inp {
    width: 100%; padding: 12px 14px; font-size: 1.05rem;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--ink);
    outline: none; transition: border-color 0.2s;
    letter-spacing: 0.04em; font-family: inherit;
  }
  .ans-inp:focus { border-color: var(--blue); }
  .ans-inp.ok { border-color: var(--green); background: var(--green-light); }
  .ans-inp.ng { border-color: var(--red); background: var(--red-light); }

  .feedback {
    margin-top: 10px; padding: 10px 14px; border-radius: 8px;
    font-size: 0.85rem; line-height: 1.6; display: none;
  }
  .feedback.ok { background: var(--green-light); color: var(--green); display: block; }
  .feedback.ng { background: var(--red-light); color: var(--red); display: block; }
  .reveal { font-size: 1rem; font-weight: 600; margin-top: 4px; letter-spacing: 0.04em; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .btn-nav {
    background: none; border: 1.5px solid var(--border);
    border-radius: 8px; padding: 7px 14px;
    font-size: 0.82rem; color: var(--ink); cursor: pointer; font-family: inherit;
  }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .nav-cnt { font-size: 0.78rem; color: var(--muted); }

  .score-card {
    text-align: center; padding: 28px 20px;
    background: var(--surface); border-radius: 16px;
    border: 1px solid var(--border); margin-bottom: 12px;
  }
  .score-big { font-size: 3.5rem; font-weight: 800; color: var(--gold); line-height: 1; }
  .score-sub { font-size: 0.85rem; color: var(--muted); margin-top: 6px; }
  .score-msg { font-size: 1rem; font-weight: 600; margin-top: 12px; }

  /* ローディング */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>🐉 中国語練習アプリ</h1>
  <p id="headerSub">例文を入力して練習をはじめましょう</p>
</header>

<!-- ===== 画面①：例文入力 ===== -->
<div id="screenInput" class="screen active">
  <div class="card">
    <h2><span class="badge">1</span> 練習セットのタイトル（任意）</h2>
    <input type="text" class="title-inp" id="titleInput" placeholder="例：文型8・9「没有／什么」練習" />
  </div>

  <!-- 入力モード切替 -->
  <div class="mode-tabs" style="margin-bottom:14px;">
    <button class="mode-tab active" id="modeTabAI" onclick="switchInputMode('ai')">
      <span class="num">🤖</span>中国語だけ入力
    </button>
    <button class="mode-tab" id="modeTabManual" onclick="switchInputMode('manual')">
      <span class="num">✍️</span>3行セットで入力
    </button>
  </div>

  <!-- AI生成モード -->
  <div id="panelAI">
    <div class="card">
      <h2><span class="badge">2</span> Gemini APIキーを入力</h2>
      <div class="format-hint">
        <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#5a4a00;font-weight:700;">Google AI Studio</a> でAPIキーを取得してここに貼り付けてください。
      </div>
      <input type="password" class="title-inp" id="apiKeyInput" placeholder="AIzaSy..." />
    </div>
    <div class="card">
      <h2><span class="badge">3</span> 中国語の例文を入力（1行1文）</h2>
      <div class="format-hint">
        中国語の文を1行に1つ入力してください。<br>
        ピン音と日本語訳はAIが自動で生成します。
      </div>
      <textarea id="inputAreaAI" placeholder="教室里没有教师。
院子里没有小孩儿。
房间里没有电话。
这是什么？
你在做什么？"></textarea>
      <div id="inputMsgAI" class="msg"></div>
      <div class="btn-row">
        <button class="btn btn-ink" id="btnGenerate" onclick="generateWithAI()">🤖 AIで生成して練習スタート</button>
        <button class="btn btn-muted" onclick="loadSampleAI()">サンプルを読み込む</button>
      </div>
    </div>
  </div>

  <!-- 手動入力モード -->
  <div id="panelManual" style="display:none;">
    <div class="card">
      <h2><span class="badge">2</span> 例文を貼り付ける</h2>
      <div class="format-hint">
        <strong>入力形式（1例文 = 3行）：</strong><br>
        <code>中国語の文</code><br>
        <code>ピン音</code><br>
        <code>日本語訳</code><br>
        例文と例文の間の空行はあってもなくても大丈夫です。
      </div>
      <textarea id="inputArea" placeholder="教室里没有教师。
Jiàoshì li méiyǒu jiàoshī.
教室には先生はいません。

院子里没有小孩儿。
Yuànzi li méiyǒu xiǎoháir.
庭には子供はいません。"></textarea>
      <div id="inputMsg" class="msg"></div>
      <div class="btn-row">
        <button class="btn btn-ink" onclick="startPractice()">▶ 練習をスタート</button>
        <button class="btn btn-muted" onclick="loadSample()">サンプルを読み込む</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== 画面②：練習 ===== -->
<div id="screenPractice" class="screen">
  <div class="top-bar">
    <button class="btn-back" onclick="backToInput()">← 例文を変更</button>
    <span id="sentCount" style="font-size:0.78rem;color:var(--muted);"></span>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-copy" onclick="setMode('copy')">
      <span class="num">①</span>見て入力
    </button>
    <button class="mode-tab" id="tab-blank" onclick="setMode('blank')">
      <span class="num">②</span>穴埋め
    </button>
    <button class="mode-tab" id="tab-full" onclick="setMode('full')">
      <span class="num">③</span>全文入力
    </button>
  </div>
  <div class="prog-bg"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <div class="prog-text" id="progText">0 / 0</div>
  <div id="practiceArea"></div>
</div>

<script>
let sentences = [], mode = 'copy', idx = 0, answered = [];

const SAMPLE_TITLE = '文型8・9「没有／什么」練習';
const SAMPLE = `教室里没有教师。
Jiàoshì li méiyǒu jiàoshī.
教室には先生はいません。

院子里没有小孩儿。
Yuànzi li méiyǒu xiǎoháir.
庭には子供はいません。

房间里没有电话。
Fángjiān li méiyǒu diànhuà.
部屋には電話はありません。

书架上没有报纸。
Shūjià shang méiyǒu bàozhǐ.
本棚には新聞はありません。

这是什么？
Zhè shì shénme?
これは何ですか。

你在做什么？
Nǐ zài zuò shénme?
何をしていますか。

你叫什么名字？
Nǐ jiào shénme míngzi?
お名前は何ですか。

那本是什么书？
Nà běn shì shénme shū?
あれはどんな本ですか。`;

function loadSample() {
  document.getElementById('titleInput').value = SAMPLE_TITLE;
  document.getElementById('inputArea').value = SAMPLE;
  document.getElementById('inputMsg').style.display = 'none';
}

function loadSampleAI() {
  document.getElementById('titleInput').value = SAMPLE_TITLE;
  document.getElementById('inputAreaAI').value =
    '教室里没有教师。\n院子里没有小孩儿。\n房间里没有电话。\n这是什么？\n你在做什么？';
  document.getElementById('inputMsgAI').style.display = 'none';
}

function switchInputMode(m) {
  document.getElementById('panelAI').style.display = m === 'ai' ? 'block' : 'none';
  document.getElementById('panelManual').style.display = m === 'manual' ? 'block' : 'none';
  document.getElementById('modeTabAI').classList.toggle('active', m === 'ai');
  document.getElementById('modeTabManual').classList.toggle('active', m === 'manual');
}

async function generateWithAI() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const raw = document.getElementById('inputAreaAI').value.trim();
  const msgEl = document.getElementById('inputMsgAI');
  const btn = document.getElementById('btnGenerate');

  if (!apiKey) { showMsgEl(msgEl, 'error', 'APIキーを入力してください。'); return; }
  if (!raw) { showMsgEl(msgEl, 'error', '中国語の例文を入力してください。'); return; }

  const cnLines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (cnLines.length < 2) { showMsgEl(msgEl, 'error', '例文を2つ以上入力してください。'); return; }

  // ボタンをローディング状態に
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>AIが生成中…';
  showMsgEl(msgEl, 'success', '⏳ Gemini APIに接続中…');

  try {
    const prompt = `以下の中国語の文について、それぞれピン音（声調付き）と日本語訳を生成してください。
必ずJSON配列の形式で返してください。他の文章は一切不要です。

例：
[
  {"cn":"你好。","pinyin":"Nǐ hǎo.","ja":"こんにちは。"},
  {"cn":"谢谢。","pinyin":"Xièxiè.","ja":"ありがとう。"}
]

中国語リスト：
${cnLines.map((l, i) => (i+1) + '. ' + l).join('\n')}`;

    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.1 }
        })
      }
    );

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'APIエラー（ステータス ' + res.status + '）');
    }

    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    // JSON部分を抽出
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('AIの返答からJSONを取得できませんでした。');
    const generated = JSON.parse(jsonMatch[0]);

    if (!Array.isArray(generated) || generated.length === 0) {
      throw new Error('生成結果が空でした。もう一度お試しください。');
    }

    sentences = generated;
    const title = document.getElementById('titleInput').value.trim() || '中国語練習';
    document.getElementById('headerSub').textContent = title + '　' + sentences.length + '件';
    document.getElementById('sentCount').textContent = sentences.length + '件の例文';
    showMsgEl(msgEl, 'success', '✅ ' + sentences.length + '件を生成しました！');

    setTimeout(() => {
      document.getElementById('screenInput').classList.remove('active');
      document.getElementById('screenPractice').classList.add('active');
      setMode('copy');
    }, 500);

  } catch (e) {
    showMsgEl(msgEl, 'error', '❌ エラー：' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🤖 AIで生成して練習スタート';
  }
}

function showMsgEl(el, type, text) {
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

function parse(raw) {
  // 空行を除いた全行を取得（空行あり・なし両方に対応）
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const errors = [], results = [];
  if (lines.length < 3) {
    errors.push('例文が足りません。中国語・ピン音・日本語訳の3行を1セットとして入力してください。');
    return { results, errors };
  }
  // 3行ごとに1例文として読み取る
  for (let i = 0; i + 2 < lines.length; i += 3) {
    results.push({ cn: lines[i], pinyin: lines[i+1], ja: lines[i+2] });
  }
  return { results, errors };
}

function startPractice() {
  const raw = document.getElementById('inputArea').value.trim();
  if (!raw) { showMsg('error', '例文を入力してください。'); return; }
  const { results, errors } = parse(raw);
  if (errors.length) { showMsg('error', errors.join('\n')); return; }
  if (results.length < 2) { showMsg('error', '例文を2つ以上入力してください。'); return; }
  sentences = results;
  const title = document.getElementById('titleInput').value.trim() || '中国語練習';
  document.getElementById('headerSub').textContent = title + '　' + sentences.length + '件';
  document.getElementById('sentCount').textContent = sentences.length + '件の例文';
  showMsg('success', '✅ ' + sentences.length + '件を読み込みました！');
  setTimeout(() => {
    document.getElementById('screenInput').classList.remove('active');
    document.getElementById('screenPractice').classList.add('active');
    setMode('copy');
  }, 380);
}

function backToInput() {
  document.getElementById('screenPractice').classList.remove('active');
  document.getElementById('screenInput').classList.add('active');
}

function showMsg(type, text) {
  const el = document.getElementById('inputMsg');
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

function setMode(m) {
  mode = m;
  ['copy','blank','full'].forEach(n =>
    document.getElementById('tab-'+n).classList.toggle('active', n===m));
  idx = 0;
  answered = new Array(sentences.length).fill(null);
  updateProg(); render();
}

function updateProg() {
  const done = answered.filter(a => a !== null).length, total = sentences.length;
  document.getElementById('progBar').style.width = total ? (done/total*100)+'%' : '0%';
  document.getElementById('progText').textContent = done + ' / ' + total;
}

function go(d) { idx = Math.max(0, Math.min(sentences.length-1, idx+d)); render(); }

function makeBlank(cn) {
  const body = cn.replace(/[。？！，、…]+$/, '');
  const tail = cn.slice(body.length);
  const sp = Math.max(Math.ceil(body.length / 2), body.length - 5);
  return { pre: body.slice(0, sp), key: body.slice(sp), tail };
}

function render() {
  updateProg();
  const s = sentences[idx], area = document.getElementById('practiceArea');
  if (mode === 'copy') renderCopy(area, s);
  else if (mode === 'blank') renderBlank(area, s);
  else renderFull(area, s);
}

function nav() {
  const t = sentences.length;
  return '<div class="nav-row">' +
    '<button class="btn-nav" onclick="go(-1)"' + (idx===0?' disabled':'') + '>← 前へ</button>' +
    '<span class="nav-cnt">' + (idx+1) + ' / ' + t + '</span>' +
    '<button class="btn-nav" onclick="go(1)"' + (idx===t-1?' disabled':'') + '>次へ →</button>' +
    '</div>';
}

function btns(chk, sho) {
  const p = answered[idx];
  return p === null
    ? '<button class="btn btn-ink" onclick="' + chk + '()">確認する</button>' +
      '<button class="btn btn-muted" onclick="' + sho + '()">答えを見る</button>'
    : '<button class="btn btn-gold" onclick="go(1)">次へ →</button>';
}

// ① 見て入力
function renderCopy(area, s) {
  const p = answered[idx];
  area.innerHTML =
    '<div class="pcard">' +
    '<div class="card-meta">① 見て入力 ／ ' + (idx+1) + ' of ' + sentences.length + '</div>' +
    '<div class="ja-text">' + s.ja + '</div>' +
    '<div class="cn-big">' + s.cn + '</div>' +
    '<div class="py-text">' + s.pinyin + '</div>' +
    '<input class="ans-inp ' + icls(p) + '" id="ans" type="text" placeholder="ピン音を見ながら中国語を入力…"' +
    ' value="' + (p!==null?esc(s.cn):'') + '"' + (p!==null?' readonly':'') + ' />' +
    '<div class="feedback ' + fcls(p) + '">' + fbody(p, s.cn) + '</div>' +
    '<div class="btn-row">' + btns('chkCopy','shoCopy') + '</div>' +
    '</div>' + nav() + (allDone()?score():'');
  focusAns();
}
function chkCopy() { answered[idx] = normalize(document.getElementById('ans').value) === normalize(sentences[idx].cn); updateProg(); render(); }
function shoCopy() { answered[idx] = true; updateProg(); render(); }

// ② 穴埋め
function renderBlank(area, s) {
  const p = answered[idx], {pre, key, tail} = makeBlank(s.cn);
  const slot = p !== null ? key : '＿＿＿';
  area.innerHTML =
    '<div class="pcard">' +
    '<div class="card-meta">② 穴埋め ／ ' + (idx+1) + ' of ' + sentences.length + '</div>' +
    '<div class="ja-text">' + s.ja + '</div>' +
    '<div class="blank-line">' + esc(pre) + '<span class="blank-slot">' + slot + '</span>' + esc(tail) + '</div>' +
    '<div class="py-text">' + s.pinyin + '</div>' +
    '<input class="ans-inp ' + icls(p) + '" id="ans" type="text" placeholder="空欄に入る中国語を入力…"' +
    ' value="' + (p!==null?esc(key):'') + '"' + (p!==null?' readonly':'') + ' />' +
    '<div class="feedback ' + fcls(p) + '">' + fbody(p, key) + '</div>' +
    '<div class="btn-row">' + btns('chkBlank','shoBlank') + '</div>' +
    '</div>' + nav() + (allDone()?score():'');
  focusAns();
}
function chkBlank() { const {key} = makeBlank(sentences[idx].cn); answered[idx] = normalize(document.getElementById('ans').value) === normalize(key); updateProg(); render(); }
function shoBlank() { answered[idx] = true; updateProg(); render(); }

// ③ 全文入力
function renderFull(area, s) {
  const p = answered[idx];
  area.innerHTML =
    '<div class="pcard">' +
    '<div class="card-meta">③ 全文入力 ／ ' + (idx+1) + ' of ' + sentences.length + '</div>' +
    '<div class="ja-text" style="font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:16px;">' + s.ja + '</div>' +
    '<input class="ans-inp ' + icls(p) + '" id="ans" type="text" placeholder="日本語を見て中国語を全文入力…"' +
    ' value="' + (p!==null?esc(s.cn):'') + '"' + (p!==null?' readonly':'') + ' />' +
    (p!==null ? '<div style="margin-top:10px;"><div class="py-text">' + s.pinyin + '</div><div class="cn-big" style="margin-bottom:0;">' + s.cn + '</div></div>' : '') +
    '<div class="feedback ' + fcls(p) + '">' + fbody(p, s.cn) + '</div>' +
    '<div class="btn-row">' + btns('chkFull','shoFull') + '</div>' +
    '</div>' + nav() + (allDone()?score():'');
  focusAns();
}
function chkFull() { answered[idx] = normalize(document.getElementById('ans').value) === normalize(sentences[idx].cn); updateProg(); render(); }
function shoFull() { answered[idx] = true; updateProg(); render(); }

// スコア
function allDone() { return answered.every(a => a !== null); }
function score() {
  const c = answered.filter(a=>a===true).length, t = sentences.length;
  const pct = Math.round(c/t*100);
  const msg = pct===100?'🎉 パーフェクト！':pct>=80?'🌟 すばらしい！':pct>=60?'👍 もう少し！':'💪 繰り返し練習しよう！';
  return '<div class="score-card"><div class="score-big">' + pct + '%</div>' +
    '<div class="score-sub">' + c + ' / ' + t + ' 正解</div>' +
    '<div class="score-msg">' + msg + '</div>' +
    '<div style="margin-top:16px;">' +
    '<button class="btn btn-gold" onclick="setMode(mode)" style="margin-right:8px;">🔄 もう一度</button>' +
    '<button class="btn btn-muted" onclick="backToInput()">例文を変更</button>' +
    '</div></div>';
}

// 正規化（全角・半角の「？」「！」「。」などの違いを吸収）
function normalize(s) {
  return String(s)
    .trim()
    // 全角英数字・記号を半角に
    .replace(/[\uff01-\uff5e]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0))
    // 全角スペースを半角に
    .replace(/\u3000/g, ' ')
    // 連続スペースを1つに
    .replace(/\s+/g, ' ')
    // 文末句読点を除去（。？！.?!）
    .replace(/[。？！.?!]+$/, '');
}

// ユーティリティ
function icls(p) { return p===null?'':p===true?'ok':'ng'; }
function fcls(p) { return p===null?'':p===true?'ok':'ng'; }
function fbody(p, ans) {
  if (p===null) return '';
  return p===true ? '✅ 正解！' : '❌ 正解: <div class="reveal">' + ans + '</div>';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function focusAns() {
  const el = document.getElementById('ans');
  if (el && !el.readOnly) el.focus();
}

// Enterキー
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('screenInput').classList.contains('active')) {
    startPractice(); return;
  }
  const chk = document.querySelector('.btn-ink');
  const nxt = document.querySelector('.btn-gold');
  if (chk && chk.textContent.includes('確認')) chk.click();
  else if (nxt && nxt.textContent.includes('次へ')) nxt.click();
});
</script>
</body>
</html>
